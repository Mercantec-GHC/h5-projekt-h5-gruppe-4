<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Arduino Debugger</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

#container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #0002;
}

h1 { margin-top: 0; }

button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  background: #0078ff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
button:hover { background: #005fcc; }

#log {
  background: #111;
  color: #0f0;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  font-family: monospace;
  border-radius: 5px;
}

#jsonInput {
  width: 100%;
  height: 80px;
  font-family: monospace;
  padding: 10px;
  border-radius: 5px;
}
</style>
</head>
<body>

<div id="container">
  <h1>Arduino JSON Debugger</h1>

  <button id="connectBtn">🔌 Forbind</button>
  <button id="pingBtn">🟢 Ping</button>
  <button id="tempBtn">🌡️ Get Temp</button>

  <h3>Send JSON request</h3>
  <textarea id="jsonInput">{ "cmd": "getTemp", "data": {} }</textarea><br>
  <button id="sendBtn">Send</button>

  <h3>Log</h3>
  <div id="log"></div>
</div>

<script>
class ArduinoClient {
  constructor(logFn) {
    this.port = null;
    this.writer = null;
    this.readBuffer = "";
    this.nextId = 1;
    this.pending = {};
    this.eventHandlers = {};
    this.log = logFn;
  }

  async connect() {
    this.port = await navigator.serial.requestPort();
    await this.port.open({ baudRate: 9600 });

    this.writer = this.port.writable.getWriter();

    const decoder = new TextDecoderStream();
    this.port.readable.pipeTo(decoder.writable);
    const reader = decoder.readable.getReader();

    this.log("CONNECTED");

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      this.readBuffer += value;
      let lines = this.readBuffer.split("\n");
      this.readBuffer = lines.pop();

      for (let line of lines) {
        if (line.trim().length === 0) continue;
        this.handleMessage(JSON.parse(line));
      }
    }
  }

  handleMessage(msg) {
    this.log("RX: " + JSON.stringify(msg));

    if (msg.id && this.pending[msg.id]) {
      this.pending[msg.id].resolve(msg.data);
      delete this.pending[msg.id];
      return;
    }

    if (msg.event && this.eventHandlers[msg.event]) {
      this.eventHandlers[msg.event].forEach(cb => cb(msg.data));
    }
  }

  async request(cmd, data = {}) {
    const id = this.nextId++;
    const packet = { id, cmd, data };

    const json = JSON.stringify(packet) + "\n";
    this.log("TX: " + json.trim());
    await this.writer.write(new TextEncoder().encode(json));

    return new Promise((resolve, reject) => {
      this.pending[id] = { resolve, reject };
      setTimeout(() => {
        if (this.pending[id]) {
          reject("Timeout");
          delete this.pending[id];
        }
      }, 2000);
    });
  }

  on(eventName, callback) {
    if (!this.eventHandlers[eventName]) {
      this.eventHandlers[eventName] = [];
    }
    this.eventHandlers[eventName].push(callback);
  }
}

const logDiv = document.getElementById("log");
function log(msg) {
  logDiv.textContent += msg + "\n";
  logDiv.scrollTop = logDiv.scrollHeight;
}

const client = new ArduinoClient(log);

document.getElementById("connectBtn").onclick = () => client.connect();

document.getElementById("pingBtn").onclick = async () => {
  const res = await client.request("ping");
  log("PING RESPONSE: " + JSON.stringify(res));
};

document.getElementById("tempBtn").onclick = async () => {
  const res = await client.request("getTemp");
  log("TEMP RESPONSE: " + JSON.stringify(res));
};

document.getElementById("sendBtn").onclick = async () => {
  const obj = JSON.parse(document.getElementById("jsonInput").value);
  const res = await client.request(obj.cmd, obj.data);
  log("RESPONSE: " + JSON.stringify(res));
};

// Event handlers
client.on("buttonPressed", data => log("EVENT buttonPressed: " + JSON.stringify(data)));
client.on("tempUpdate", data => log("EVENT tempUpdate: " + JSON.stringify(data)));
</script>

</body>
</html>
