services:
  yellowcargame.api:
    image: ${DOCKER_REGISTRY-}yellowcargameapi
    build:
      context: .
      dockerfile: YellowCarGame.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:80
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Secret=${JWT_SECRET}
      - ConnectionStrings__PostgresDb=${POSTGRES_CONNECTION}
      - S3__Endpoint=${S3_ENDPOINT}
      - S3__UseSSL=${S3_USE_SSL}
      - S3__AccessKey=${S3_ACCESS_KEY}
      - s3__SecretKey=${S3_SECRET_KEY}
    ports:
      - "${HTTP_PORT}:80"
    restart: unless-stopped
    networks:
      - cargame
    hostname: yellowcargame.api

networks:
  cargame:
    external: true
